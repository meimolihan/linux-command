linuxCommand:
  linuxCommandContainer:
    image:
      repository: mobufan/linux-command
      tag: latest
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 50Mi
      requests:
        cpu: 100m
        memory: 50Mi
  replicas: 1
service:
  ports:
  - port: 9665
    protocol: TCP
    targetPort: 80
  type: NodePort
