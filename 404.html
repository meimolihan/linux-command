    </svg>
  </div>
  <div id="moon-bg" style="width:32px;height:32px;border-radius:50%;display:none;align-items:center;justify-content:center;">
    <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="#fff">

    </svg>
  </div>
</div>
<script>
function toggleTheme() {
  const html = document.documentElement;
  const sunBg = document.getElementById('sun-bg');
  const moonBg = document.getElementById('moon-bg');
  const themeToggle = document.getElementById('theme-toggle');
  if (html.getAttribute('data-color-mode') === 'dark') {
    html.setAttribute('data-color-mode', 'light');
    localStorage.setItem('_dark_mode_theme_', 'light');
    sunBg.style.display = 'none';
    moonBg.style.display = 'flex';
    themeToggle.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
    themeToggle.style.boxShadow = '0 4px 15px rgba(102, 126, 234, 0.4)';
  } else {
    html.setAttribute('data-color-mode', 'dark');
    localStorage.setItem('_dark_mode_theme_', 'dark');
    sunBg.style.display = 'flex';
    moonBg.style.display = 'none';
    themeToggle.style.background = 'linear-gradient(135deg, #58a6ff 0%, #79c0ff 100%)';
    themeToggle.style.boxShadow = '0 4px 15px rgba(88, 166, 255, 0.4)';
  }
}
const savedTheme = localStorage.getItem('_dark_mode_theme_');
const sunBg = document.getElementById('sun-bg');
const moonBg = document.getElementById('moon-bg');
const themeToggle = document.getElementById('theme-toggle');
if (savedTheme === 'dark' || savedTheme === null) {
  document.documentElement.setAttribute('data-color-mode', 'dark');
  document.getElementById('sun-bg').style.display = 'flex';
  document.getElementById('moon-bg').style.display = 'none';
  themeToggle.style.background = 'linear-gradient(135deg, #58a6ff 0%, #79c0ff 100%)';
  themeToggle.style.boxShadow = '0 4px 15px rgba(88, 166, 255, 0.4)';
} else if (savedTheme === 'light') {
  document.documentElement.setAttribute('data-color-mode', 'light');
  sunBg.style.display = 'none';
  moonBg.style.display = 'flex';
  themeToggle.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
  themeToggle.style.boxShadow = '0 4px 15px rgba(102, 126, 234, 0.4)';
}
</script>

      <circle cx="40" cy="50" r="6" fill="#ff5f57"/>

      <text x="40" y="140" fill="#8b949e" font-family="monospace" font-size="12">$ _</text>
      <!-- 闪烁光标 -->
      <rect x="40" y="128" width="8" height="16" fill="currentColor" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1s" repeatCount="indefinite"/>
      </rect>
      <!-- 装饰线条 -->
      <line x1="30" y1="70" x2="210" y2="70" stroke="currentColor" stroke-width="1" opacity="0.1"/>

  </div>

    </button>

  <div class="error-actions">

    <a href="hot.html" class="error-btn btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 17 10 11 4 5"></polyline>
        <line x1="12" y1="19" x2="20" y2="19"></line>
      </svg>
      命令列表
    </a>
  </div>
</div>
<script>
// 404 搜索框功能
(function() {
  var input = document.getElementById('error-search-input');
  var btn = document.getElementById('error-search-btn');
  if (!input || !btn) return;
  var basePath = ''.replace(/\/$/, '');
  function doSearch() {
    var kw = (input.value || '').trim();
    if (kw) {
      window.location.href = basePath + '/list.html#!kw=' + encodeURIComponent(kw);
    }
  }
  btn.addEventListener('click', doSearch);
  input.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doSearch();
  });
})();
</script>
